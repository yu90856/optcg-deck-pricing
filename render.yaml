services:
  - type: web
    name: optcg-deck-pricing
    runtime: python
    plan: free
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: python3 server.py --host 0.0.0.0 --port $PORT
    envVars:
      - key: KAPAIPAI_CACHE_FIRST
        value: "1"
